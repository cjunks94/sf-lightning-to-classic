<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>SF Lightning to Classic</title>
</head>
<body>
  <div class="container">
    <h1>SF Lightning → Classic</h1>
    <div class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="toggle">
        <span class="slider"></span>
      </label>
      <span id="status" class="status">Active</span>
    </div>
    <p class="description">Redirect Lightning record pages to Classic view</p>
  </div>
  <script src="../dist/popup.js"></script>
</body>
</html>
